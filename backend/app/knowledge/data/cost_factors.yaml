# 造价估算系数库 (Cost Estimation Factors)
# 工程师可编辑此文件调整各项费率和单价
# 所有费用单位为人民币万元，除特殊标注外

capex:
  civil:
    description_zh: "土建费用系数"
    unit_costs_cny_per_m3:
      aeration_tank: 800
      anoxic_tank: 800
      anaerobic_tank: 850
      oxidation_ditch: 900
      primary_clarifier: 750
      secondary_clarifier: 750
      tube_settler: 700
      grit_chamber: 900
      equalization_tank: 700
      hydrolysis_acidification: 850
      mbr_tank: 1000
      uasb: 1200
      sbr_reactor: 850
      disinfection_channel: 600
      coagulation_tank: 650
      coagulation_sedimentation: 700
      advanced_oxidation_tank: 800
      sludge_thickening: 650
      sludge_dewatering_room: 1200
      blower_room: 1500
      chemical_room: 1200
      control_room: 1800
      office_building: 2200
      default: 800

    excavation_depth_factor:
      threshold_depth_m: 5.0
